{% extends 'base.html' %}
{% block head %}
<script type="text/javascript" src="/static/qrcode.min.js"></script>
<style type="text/css">
        * {
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
          box-sizing: border-box;
        }

        body {
          margin: 0;
          font-size: 14px;
        }

        .centered {
          display: block;
          margin: 0 auto;
        }

        #call-button {
          padding: 1rem 2rem;
          border: none;
          border-radius: 3px;
          cursor: pointer;
          color: white;
          background-color: black;
          box-shadow: 0px 5px 20px rgba(0, 0, 0, 0.3);
        }

        #video-container {
          width: 100%;
          min-width: 300px;
        }

        #videos {
          position: relative;
        }

        video {
          background-color: black;
          border-radius: 3px;
          box-shadow: 0px 5px 20px rgba(0, 0, 0, 0.3);
        }

        #remote-video {
          width: 100%;
        }

        #local-video {
          position: absolute;
          width: 25vw;
          height: 25vw;
          bottom: -30px;
          right: -30px;
        }
      </style>
{% endblock %}
{% block content %}
<legend>Video Chat</legend>
<div id="all-div">
<p id="call-div">Your username is <b id="thename">{{ thename }}</b> <button onclick="copyToClipboard('thename');" class="btn btn-outline-primary">Copy</button></p>
<button id="call-button">Call someone</button>
<div>
    <div id="video-container" class="centered">
      <div id="videos">
        <video id="remote-video" autoplay="autoplay"></video>
        <iframe id="local-video" src="{{ base_url }}/chat/video/mirror/"></iframe>
      </div>
    </div>
</div>
</div>
<button class="btn btn-lg btn-outline-primary" id="please-interact">Join a meeting</button>
<hr>
{% include 'social.html' %}
{% endblock %}
{% block javascript %}
{% include 'chat/rtc.js' %}
{% endblock %}
